name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t playwright-lambda .

      - name: Smoke test
        run: |
          docker run -d --name test -p 9000:8080 playwright-lambda
          sleep 5
          RESPONSE=$(curl -s -XPOST "http://localhost:9000/2015-03-31/functions/function/invocations" \
            -d '{"url": "https://example.com", "script": "result[\"title\"] = page.title()"}')
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); assert d['statusCode'] == 200, f'Expected 200, got {d[\"statusCode\"]}'; print('PASS')"
          docker rm -f test

      - name: Warmup ping returns 200
        run: |
          docker run -d --name test -p 9000:8080 playwright-lambda
          sleep 5
          RESPONSE=$(curl -s -XPOST "http://localhost:9000/2015-03-31/functions/function/invocations" -d '{}')
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); assert d['statusCode'] == 200, f'Expected 200, got {d[\"statusCode\"]}'; print('PASS')"
          docker rm -f test
