[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "UP",    # pyupgrade
]
ignore = [
    "S102",  # exec() — intentional, core design of the handler
    "S110",  # try-except-pass — intentional in cleanup/health-check code
    "S310",  # urllib.request — all URLs are localhost or controlled
    "S603",  # subprocess — used in tests for Docker
    "S607",  # partial path — Docker/pytest invocations
    "B018",  # useless expression — _browser.contexts is an intentional health probe
    "E501",  # line length — handled by formatter, not lint
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is fine in tests
"examples/*" = ["F821"]  # page, event, result, context are injected by handler
